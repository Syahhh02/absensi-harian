<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="refresh" content="0; url=absensi.html"/>
<title>Absensi Harian</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0f14;--panel:#161922;--border:#252a36;
  --accent:#4fffb0;--accent2:#ff6b6b;--accent3:#ffd166;
  --text:#e8eaf0;--muted:#6b7280;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:36px 20px 80px;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(79,255,176,.03)1px,transparent 1px),
    linear-gradient(90deg,rgba(79,255,176,.03)1px,transparent 1px);
  background-size:40px 40px;
}
body>*{position:relative;z-index:1;}

/* HEADER */
.hdr{text-align:center;margin-bottom:24px;width:100%;max-width:560px;}
.hdr .lbl{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
.hdr h1{font-size:26px;font-weight:600;margin-bottom:12px;}
.date-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
.date-display{
  font-family:'Space Mono',monospace;font-size:12px;color:var(--text);
  background:var(--panel);border:1px solid var(--border);
  padding:6px 14px;border-radius:99px;cursor:pointer;
  transition:border-color .15s;user-select:none;display:inline-flex;align-items:center;gap:6px;
}
.date-display:hover{border-color:var(--accent);}
#dateInput{
  background:var(--panel);border:1px solid var(--accent);color:var(--text);
  font-family:'Space Mono',monospace;font-size:12px;padding:6px 12px;
  border-radius:99px;outline:none;display:none;
}
#dateInput::-webkit-calendar-picker-indicator{filter:invert(.6);cursor:pointer;}

/* TABS */
.tabs{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:22px;width:100%;max-width:560px;}
.tab{flex:1;padding:9px 6px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--bg);color:var(--text);border:1px solid var(--border);}

/* CARD */
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:26px;width:100%;max-width:560px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
.slbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
.qn{font-size:17px;font-weight:500;line-height:1.4;margin-bottom:18px;}

/* INPUTS */
.input-row{display:flex;gap:8px;margin-bottom:10px;}
input[type="text"]{flex:1;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s;}
input[type="text"]:focus{border-color:var(--accent);}
input[type="text"]::placeholder{color:var(--muted);}

/* ROSTER */
.roster-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;}
.roster-list::-webkit-scrollbar{width:4px;}
.roster-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.roster-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;}
.ri-l{display:flex;align-items:center;gap:8px;}
.ri-n{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
.ri-name{font-weight:500;}
.rm-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 4px;border-radius:4px;transition:all .1s;line-height:1;}
.rm-btn:hover{color:var(--accent2);background:rgba(255,107,107,.1);}
.empty{text-align:center;padding:22px;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:8px;}

/* NAME TOGGLE LIST */
.name-scroll{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:2px;}
.name-scroll::-webkit-scrollbar{width:4px;}
.name-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.name-toggle{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;width:100%;}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:background .15s;}
.name-toggle .nm{flex:1;}
.name-toggle .ck{font-size:13px;opacity:0;transition:opacity .1s;flex-shrink:0;color:var(--accent2);}
.name-toggle.selected{border-color:var(--accent2);background:rgba(255,107,107,.07);}
.name-toggle.selected .avatar{background:rgba(255,107,107,.2);color:var(--accent2);}
.name-toggle.selected .ck{opacity:1;}

/* BUTTONS */
.btn{padding:10px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;}
.btn:hover{background:var(--border);}
.btn.pr{background:var(--accent);color:#0d0f14;border-color:var(--accent);font-weight:600;}
.btn.pr:hover{background:#3de89e;}
.btn.pr:disabled{opacity:.35;cursor:not-allowed;}
.btn.dn{background:var(--accent2);color:#fff;border-color:var(--accent2);font-weight:600;}
.btn.dn:hover{background:#e55a5a;}
.btn-g{display:flex;gap:8px;flex-wrap:wrap;}
.btn-blk{width:100%;margin-top:8px;}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:6px;}
.tag{display:inline-flex;align-items:center;gap:5px;background:rgba(79,255,176,.08);border:1px solid rgba(79,255,176,.2);color:var(--accent);padding:4px 10px;border-radius:99px;font-size:12px;font-weight:500;}
.tag.red{background:rgba(255,107,107,.08);border-color:rgba(255,107,107,.2);color:var(--accent2);}
.tag.yellow{background:rgba(255,209,102,.08);border-color:rgba(255,209,102,.2);color:var(--accent3);}

/* SUMMARY BOX */
.sbox{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.srow{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px;gap:10px;}
.srow:first-child{padding-top:0;}
.srow:last-child{border-bottom:none;padding-bottom:0;}
.sk{color:var(--muted);flex-shrink:0;}
.sv{font-weight:600;text-align:right;}
.sv.g{color:var(--accent);}
.sv.r{color:var(--accent2);}
.sv.y{color:var(--accent3);}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0;}

/* LAPORAN: mode buttons */
.rep-filter{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.rep-btn{padding:7px 16px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.rep-btn:hover{color:var(--text);border-color:var(--accent);}
.rep-btn.active{background:var(--accent);color:#0d0f14;border-color:var(--accent);font-weight:600;}

/* HARIAN: horizontal date scroll */
.date-scroll-wrap{margin-bottom:16px;}
.date-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.date-scroll::-webkit-scrollbar{height:3px;}
.date-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.date-pill{flex-shrink:0;scroll-snap-align:center;display:flex;flex-direction:column;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 10px;min-width:52px;cursor:pointer;transition:all .15s;}
.date-pill:hover{border-color:var(--accent);}
.date-pill.active-pill{background:var(--accent);border-color:var(--accent);}
.date-pill.active-pill .dp-day,.date-pill.active-pill .dp-num{color:#0d0f14;}
.dp-day{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;font-family:'DM Sans',sans-serif;}
.dp-num{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--text);}
.date-pill.has-data::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:4px;display:block;}
.date-pill.active-pill.has-data::after{background:#0d0f14;}

/* MINGGUAN: date range picker */
.week-range-wrap{margin-bottom:16px;}
.week-inputs{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.week-inputs label{font-size:12px;color:var(--muted);white-space:nowrap;}
.week-inputs input[type="date"]{
  flex:1;min-width:120px;padding:7px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;
  outline:none;transition:border-color .15s;display:block;
}
.week-inputs input[type="date"]:focus{border-color:var(--accent);}
.week-inputs input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer;}
.range-hint{font-size:11px;margin-top:6px;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;}
.stat-val{font-size:24px;font-weight:700;font-family:'Space Mono',monospace;}
.stat-val.g{color:var(--accent);}
.stat-val.r{color:var(--accent2);}
.stat-val.y{color:var(--accent3);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;}

/* BAR CHART */
.bar-chart{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.bar-row{display:flex;align-items:center;gap:10px;font-size:12px;}
.bar-name{width:90px;text-align:right;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.bar-track{flex:1;background:var(--border);border-radius:99px;height:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;background:var(--accent2);transition:width .4s ease;}
.bar-cnt{width:28px;text-align:right;font-family:'Space Mono',monospace;font-size:11px;color:var(--accent2);}

/* REP ENTRIES */
.rep-entries{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto;}
.rep-entries::-webkit-scrollbar{width:4px;}
.rep-entries::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.rep-entry{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px 14px;font-size:13px;}
.re-date{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:6px;}
.re-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;margin-bottom:3px;}
.re-row:last-child{margin-bottom:0;}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;margin-top:2px;}
.sdot.g{background:var(--accent);box-shadow:0 0 5px var(--accent);}
.sdot.r{background:var(--accent2);box-shadow:0 0 5px var(--accent2);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:999;display:flex;align-items:center;justify-content:center;}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:28px;max-width:360px;width:90%;position:relative;}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent3),transparent);}
.modal-icon{font-size:32px;text-align:center;margin-bottom:12px;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:6px;}
.modal-body{font-size:14px;color:var(--muted);margin-bottom:22px;line-height:1.6;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="lbl">● Sistem Absensi</div>
  <h1>Absensi Harian</h1>
  <div class="date-row" id="headerDateRow">
    <div class="date-display" onclick="toggleDateInput()">
      <span id="dateDisplayText">—</span>
      <span style="opacity:.5;font-size:11px">✏️</span>
    </div>
    <input type="date" id="dateInput" onchange="applyDate()" onblur="closeDateInput()"/>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tab0" onclick="switchTab(0)">📋 Absensi</button>
  <button class="tab"        id="tab1" onclick="switchTab(1)">📊 Laporan</button>
  <button class="tab"        id="tab2" onclick="switchTab(2)">👥 Tim</button>
  <button class="tab"        id="tab3" onclick="switchTab(3)">💾 Data</button>
</div>

<div id="page0" style="width:100%;max-width:560px;"></div>
<div id="page1" style="width:100%;max-width:560px;display:none;"></div>
<div id="page2" style="width:100%;max-width:560px;display:none;"></div>
<div id="page3" style="width:100%;max-width:560px;display:none;"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-icon" id="modalIcon">⚠️</div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════
   STORAGE
════════════════════════════════════════ */
const LS = {
  getRoster(){ try{return JSON.parse(localStorage.getItem('roster')||'[]');}catch{return[];} },
  saveRoster(r){ localStorage.setItem('roster',JSON.stringify(r)); },
  getHistory(){ try{return JSON.parse(localStorage.getItem('absenHist')||'[]');}catch{return[];} },
  saveHistory(h){ localStorage.setItem('absenHist',JSON.stringify(h)); }
};

/* ════════════════════════════════════════
   DATE HELPERS
════════════════════════════════════════ */
let activeDate = new Date();

function toYMD(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fromYMD(s){ const [y,m,d]=s.split('-'); return new Date(+y,+m-1,+d); }
function fmtDate(d){ return d.toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
function fmtShort(d){ return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'}); }
function fmtMonth(d){ return d.toLocaleDateString('id-ID',{month:'long',year:'numeric'}); }
function dayName(d){ return d.toLocaleDateString('id-ID',{weekday:'short'}); }

function applyDisplayDate(){
  document.getElementById('dateDisplayText').textContent = fmtDate(activeDate);
  document.getElementById('dateInput').value = toYMD(activeDate);
}
function toggleDateInput(){
  const el=document.getElementById('dateInput');
  const open = el.style.display==='inline-block';
  el.style.display = open?'none':'inline-block';
  if(!open) el.focus();
}
function applyDate(){
  const val=document.getElementById('dateInput').value;
  if(val){ activeDate=fromYMD(val); applyDisplayDate(); document.getElementById('dateInput').style.display='none'; resetAbsen(false); renderPage(); }
}
function closeDateInput(){ setTimeout(()=>{ document.getElementById('dateInput').style.display='none'; },200); }

/* ════════════════════════════════════════
   MODAL
════════════════════════════════════════ */
function showModal(icon, title, body, actions){
  document.getElementById('modalIcon').textContent=icon;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalActions').innerHTML=actions;
  document.getElementById('modalOverlay').style.display='flex';
}
function closeModal(){ document.getElementById('modalOverlay').style.display='none'; }

/* ════════════════════════════════════════
   TAB SWITCH
════════════════════════════════════════ */
let activeTab=0;
function switchTab(t){
  activeTab=t;
  [0,1,2,3].forEach(i=>{
    document.getElementById('tab'+i).classList.toggle('active',i===t);
    document.getElementById('page'+i).style.display=i===t?'':'none';
  });
  document.getElementById('headerDateRow').style.display = t===0 ? '' : 'none';
  renderPage();
}
function renderPage(){
  if(activeTab===0) renderAbsensi();
  else if(activeTab===1) renderLaporan();
  else if(activeTab===2) renderSetup();
  else renderData();
}

/* ════════════════════════════════════════
   SETUP TAB
════════════════════════════════════════ */
function renderSetup(){
  const roster=LS.getRoster();
  const pg=document.getElementById('page2');
  const list=roster.length===0
    ?`<div class="empty">Belum ada anggota tim.</div>`
    :`<div class="roster-list">${roster.map((n,i)=>`
        <div class="roster-item">
          <div class="ri-l"><span class="ri-n">${String(i+1).padStart(2,'0')}</span><span class="ri-name">${n}</span></div>
          <button class="rm-btn" onclick="removeMember(${i})">×</button>
        </div>`).join('')}
      </div>
      <div style="margin-top:10px;text-align:right;font-size:12px;color:var(--muted)">${roster.length} anggota terdaftar</div>`;
  pg.innerHTML=`<div class="card">
    <div class="slbl">Manajemen Tim</div>
    <div class="qn" style="margin-bottom:14px">Daftar Anggota Tim</div>
    <div class="input-row">
      <input type="text" id="setupIn" placeholder="Nama anggota... (Enter)" onkeydown="if(event.key==='Enter')addMember()"/>
      <button class="btn pr" onclick="addMember()">+ Tambah</button>
    </div>
    ${list}
  </div>`;
}
function addMember(){
  const el=document.getElementById('setupIn'); const name=el.value.trim();
  if(!name)return;
  const r=LS.getRoster();
  if(!r.includes(name)){r.push(name);LS.saveRoster(r);}
  el.value='';renderSetup();el.focus();
}
function removeMember(i){
  const r=LS.getRoster();r.splice(i,1);LS.saveRoster(r);renderSetup();
}

/* ════════════════════════════════════════
   ABSENSI TAB
════════════════════════════════════════ */
const AS={
  step:'ask',
  // tidak hadir
  absentIds:[], hasBackup:null, backupNames:[], backupSearchQ:'',
  // libur (selalu ditanya)
  liburIds:[], liburNote:'', hasLibur:null, liburSearchQ:'',
  // misc
  savedKey:null, searchQ:'',
  // flow: 'lengkap' | 'tidak'
  flow:null
};

function resetAbsen(rerender=true){
  Object.assign(AS,{
    step:'ask', flow:null,
    absentIds:[], hasBackup:null, backupNames:[], backupSearchQ:'',
    liburIds:[], liburNote:'', hasLibur:null, liburSearchQ:'',
    savedKey:null, searchQ:''
  });
  ES.active=false; ES.section=null; ES.absentIds=[]; ES.hasBackup=null;
  ES.backupNames=[]; ES.searchQ=''; ES.backupSearchQ='';
  if(rerender) renderAbsensi();
}

function renderAbsensi(){
  const roster=LS.getRoster();
  const pg=document.getElementById('page0');
  if(!roster.length){
    pg.innerHTML=`<div class="card" style="text-align:center">
      <div style="font-size:36px;margin-bottom:12px">👥</div>
      <div class="qn">Tim belum ada anggota</div>
      <p style="color:var(--muted);font-size:14px;margin-bottom:20px">Tambahkan dulu di tab Tim.</p>
      <button class="btn pr" onclick="switchTab(2)">+ Atur Tim</button>
    </div>`; return;
  }

  const key=toYMD(activeDate);
  const hist=LS.getHistory();
  const existing=hist.find(h=>h.key===key);
  if(existing && AS.savedKey!==key){
    renderAlreadySaved(pg,existing); return;
  }

  if(AS.step==='ask')          renderAsk(pg);
  else if(AS.step==='pick')    renderPick(pg,roster);
  else if(AS.step==='backup')  renderBackup(pg,roster);
  else if(AS.step==='libur')   renderLiburPick(pg,roster);
  else                          renderDone(pg,roster);
}

/* ── Step 1: Lengkap atau tidak hadir? ── */
function renderAsk(pg){
  pg.innerHTML=`<div class="card">
    <div class="slbl">Langkah 1</div>
    <div class="qn">Bagaimana kehadiran hari ini?</div>
    <div class="btn-g" style="flex-direction:column;gap:10px;">
      <button class="btn pr" onclick="setFlow('lengkap')">✅ Lengkap semua</button>
      <button class="btn dn" onclick="setFlow('tidak')">❌ Ada yang tidak hadir</button>
    </div>
  </div>`;
}

function setFlow(flow){
  AS.flow=flow;
  if(flow==='lengkap'){
    AS.absentIds=[]; AS.hasBackup=null; AS.backupNames=[];
    // langsung ke step libur
    AS.step='libur'; AS.hasLibur=null; AS.liburIds=[]; AS.liburNote='';
  } else {
    AS.step='pick'; AS.searchQ='';
  }
  renderAbsensi();
}

/* ── Step 2 (tidak hadir): pilih siapa ── */
function renderPick(pg,roster){
  const q=AS.searchQ.toLowerCase();
  const filtered=roster.map((n,i)=>({n,i})).filter(({n})=>n.toLowerCase().includes(q));
  const items=filtered.map(({n,i})=>{
    const sel=AS.absentIds.includes(i);
    const init=n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<button class="name-toggle ${sel?'selected':''}" onclick="toggleAbsent(${i})">
      <div class="avatar">${init}</div><span class="nm">${n}</span><span class="ck">✕</span>
    </button>`;
  }).join('');
  const cnt=AS.absentIds.length;
  pg.innerHTML=`<div class="card">
    <div class="slbl">Langkah 2</div>
    <div class="qn">Siapa yang <strong>tidak hadir</strong>?</div>
    <input type="text" id="pickSearch" placeholder="🔍 Cari nama..." value="${AS.searchQ}"
      oninput="AS.searchQ=this.value;renderAbsensi()" style="width:100%;margin-bottom:10px;"/>
    <div class="name-scroll">${items||'<div style="color:var(--muted);font-size:13px;padding:8px">Tidak ditemukan.</div>'}</div>
    <div style="margin:12px 0 14px" class="tags">
      ${cnt>0?`<div class="tag red">❌ Dipilih: ${cnt} orang</div>`:'<div style="color:var(--muted);font-size:13px">Belum ada yang dipilih</div>'}
    </div>
    <div class="divider" style="margin:0 0 14px"></div>
    <div class="btn-g">
      <button class="btn" onclick="AS.step='ask';renderAbsensi()">← Kembali</button>
      <button class="btn pr" onclick="confirmPick()" ${cnt===0?'disabled':''}>Lanjut →</button>
    </div>
  </div>`;
  const si=document.getElementById('pickSearch');
  if(si){si.focus();si.setSelectionRange(si.value.length,si.value.length);}
}

function toggleAbsent(i){
  const idx=AS.absentIds.indexOf(i);
  idx===-1?AS.absentIds.push(i):AS.absentIds.splice(idx,1);
  renderAbsensi();
}

function confirmPick(){
  if(AS.absentIds.length===0) return;
  AS.step='backup'; AS.hasBackup=null; AS.backupNames=[], AS.backupSearchQ='';
  renderAbsensi();
}

/* ── Step 3 (tidak hadir): backup ── */
function renderBackup(pg,roster){
  const absentNames=AS.absentIds.map(i=>roster[i]);
  const q=AS.backupSearchQ.toLowerCase();
  const candidates=roster.filter((_,i)=>!AS.absentIds.includes(i));
  const filteredCands=candidates.filter(n=>n.toLowerCase().includes(q));

  const candItems=filteredCands.map(n=>{
    const sel=AS.backupNames.includes(n);
    const init=n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<button class="name-toggle ${sel?'selected':''}" onclick="toggleBackupName('${n}')">
      <div class="avatar">${init}</div><span class="nm">${n}</span>
      <span class="ck" style="color:var(--accent)">✓</span>
    </button>`;
  }).join('');

  const selectedTags=AS.backupNames.map(n=>
    `<div class="tag">${n}<span style="cursor:pointer;opacity:.6;margin-left:4px" onclick="toggleBackupName('${n}')">×</span></div>`
  ).join('');

  const backupSection=AS.hasBackup===true?`
    <div style="margin-top:14px;">
      <input type="text" id="backupSearch" placeholder="🔍 Cari dari daftar tim..." value="${AS.backupSearchQ}"
        oninput="AS.backupSearchQ=this.value;renderAbsensi()" style="width:100%;margin-bottom:10px;"/>
      <div class="name-scroll" style="max-height:180px;">${filteredCands.length?candItems:'<div style="color:var(--muted);font-size:13px;padding:8px">Tidak ditemukan.</div>'}</div>
      ${AS.backupNames.length?`<div class="tags" style="margin-top:10px;">${selectedTags}</div>`:''}
    </div>`:'';

  pg.innerHTML=`<div class="card">
    <div class="slbl">Langkah 3</div>
    <div class="qn">Ada <strong>backup/pengganti</strong> untuk yang tidak hadir?</div>
    <div class="tags" style="margin-bottom:16px">${absentNames.map(n=>`<div class="tag red">${n}</div>`).join('')}</div>
    <div class="btn-g">
      <button class="btn ${AS.hasBackup===true?'pr':''}" onclick="setBackup(true)">✅ Ada backup</button>
      <button class="btn ${AS.hasBackup===false?'dn':''}" onclick="setBackup(false)">❌ Tidak ada</button>
    </div>
    ${backupSection}
    <div class="divider"></div>
    <div class="btn-g">
      <button class="btn" onclick="AS.step='pick';renderAbsensi()">← Kembali</button>
      <button class="btn pr" onclick="confirmBackup()" ${AS.hasBackup===null?'disabled':''}>Lanjut →</button>
    </div>
  </div>`;
  if(AS.hasBackup===true) setTimeout(()=>{const e=document.getElementById('backupSearch');if(e)e.focus();},50);
}

function setBackup(v){ AS.hasBackup=v; if(!v)AS.backupNames=[]; renderAbsensi(); }
function toggleBackupName(n){
  const idx=AS.backupNames.indexOf(n);
  idx===-1?AS.backupNames.push(n):AS.backupNames.splice(idx,1);
  renderAbsensi();
}
function confirmBackup(){
  if(AS.hasBackup===null) return;
  AS.step='libur'; AS.hasLibur=null; AS.liburIds=[]; AS.liburNote=''; AS.liburSearchQ='';
  renderAbsensi();
}

/* ── Step 4 (selalu): libur ── */
function renderLiburPick(pg,roster){
  // kandidat libur = semua kecuali yang sudah tidak hadir
  const q=(AS.liburSearchQ||'').toLowerCase();
  const candidates=roster.filter((_,i)=>!AS.absentIds.includes(i));
  const filtered=candidates.filter(n=>n.toLowerCase().includes(q));

  const items=filtered.map(n=>{
    const i=roster.indexOf(n);
    const sel=AS.liburIds.includes(i);
    const init=n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<button class="name-toggle ${sel?'selected':''}" style="${sel?'border-color:var(--accent3);background:rgba(255,209,102,.07);':''}"
      onclick="toggleLibur(${i})">
      <div class="avatar" style="${sel?'background:rgba(255,209,102,.2);color:var(--accent3);':''}">${init}</div>
      <span class="nm">${n}</span>
      <span class="ck" style="color:var(--accent3);${sel?'opacity:1;':'opacity:0;'}">🎌</span>
    </button>`;
  }).join('');

  const cnt=AS.liburIds.length;
  const backStep=AS.flow==='tidak'?'backup':'ask';

  const noteInput=cnt>0?`
    <input type="text" id="liburNote" placeholder="Keterangan libur... (opsional, misal: Cuti, Libur Nasional)"
      value="${AS.liburNote}" oninput="AS.liburNote=this.value" style="width:100%;margin-top:10px;"
      onkeydown="if(event.key==='Enter')confirmLiburPick()"/>`:'' ;

  const stepNum=AS.flow==='tidak'?4:3;

  pg.innerHTML=`<div class="card">
    <div class="slbl">Langkah ${stepNum}</div>
    <div class="qn">Ada yang <strong>libur</strong> hari ini?</div>
    <div class="btn-g" style="margin-bottom:14px;">
      <button class="btn ${AS.hasLibur===true?'pr':''}" style="${AS.hasLibur===true?'':'border-color:var(--accent3);color:var(--accent3);'}"
        onclick="AS.hasLibur=true;renderAbsensi()">🎌 Ada yang libur</button>
      <button class="btn ${AS.hasLibur===false?'dn':''}" onclick="AS.hasLibur=false;AS.liburIds=[];renderAbsensi()">✖ Tidak ada</button>
    </div>
    ${AS.hasLibur===true?`
      <input type="text" id="liburSearch" placeholder="🔍 Cari nama..." value="${AS.liburSearchQ||''}"
        oninput="AS.liburSearchQ=this.value;renderAbsensi()" style="width:100%;margin-bottom:10px;"/>
      <div class="name-scroll">${filtered.length?items:'<div style="color:var(--muted);font-size:13px;padding:8px">Tidak ditemukan.</div>'}</div>
      <div style="margin:10px 0 4px" class="tags">
        ${cnt>0?`<div class="tag yellow">🎌 Libur: ${cnt} orang</div>`:'<div style="color:var(--muted);font-size:13px">Belum ada yang dipilih</div>'}
      </div>
      ${noteInput}
    `:''}
    <div class="divider" style="margin:14px 0;"></div>
    <div class="btn-g">
      <button class="btn" onclick="AS.step='${backStep}';renderAbsensi()">← Kembali</button>
      <button class="btn pr" onclick="confirmLiburPick()"
        ${AS.hasLibur===null?'disabled':AS.hasLibur===true&&cnt===0?'disabled':''}>Selesai ✓</button>
    </div>
  </div>`;

  if(AS.hasLibur===true){
    setTimeout(()=>{ const e=document.getElementById('liburSearch'); if(e)e.focus(); },50);
  }
}

function toggleLibur(i){
  const idx=AS.liburIds.indexOf(i);
  idx===-1?AS.liburIds.push(i):AS.liburIds.splice(idx,1);
  renderAbsensi();
}
function confirmLiburPick(){
  if(AS.hasLibur===null) return;
  if(AS.hasLibur===true && AS.liburIds.length===0) return;
  AS.step='done';
  renderAbsensi();
}

/* Done */
function renderDone(pg,roster){
  const key=toYMD(activeDate);
  if(AS.savedKey!==key){
    AS.savedKey=key;
    const hist=LS.getHistory();
    const idx=hist.findIndex(h=>h.key===key);
    const liburIds=AS.liburIds||[];
    const liburNames=liburIds.map(i=>roster[i]);
    const backupCount=AS.hasBackup===true?AS.backupNames.length:0;
    // efektif = yang wajib masuk = total tim - semua yang libur (tetap 8, tidak berubah karena backup)
    const efektif=roster.length-liburIds.length;
    // hadirCount = yang wajib masuk - yang absen + backup (backup menggantikan yang absen)
    const hadirCount=Math.min(efektif, efektif-AS.absentIds.length+backupCount);
    const lengkap=hadirCount>=efektif;
    const liburAktif=liburNames.filter(n=>!AS.backupNames.includes(n));
    const entry={
      key, date:fmtDate(activeDate),
      lengkap,
      absentNames: AS.absentIds.map(i=>roster[i]),
      hasBackup: AS.hasBackup,
      backupNames: [...AS.backupNames],
      hasLibur: AS.hasLibur===true,
      liburNames,       // semua yg terdaftar libur
      liburAktif,       // libur yg tidak jadi backup
      liburNote: AS.liburNote||'',
      total: efektif,
      totalTim: roster.length,
      hadirCount
    };
    if(idx!==-1)hist[idx]=entry;else hist.unshift(entry);
    hist.sort((a,b)=>b.key.localeCompare(a.key));
    LS.saveHistory(hist);
  }

  const liburIds=AS.liburIds||[];
  const liburNames=liburIds.map(i=>roster[i]);
  const backupCount=AS.hasBackup===true?AS.backupNames.length:0;
  const efektif=roster.length-liburIds.length;
  const hadirCount=Math.min(efektif, efektif-AS.absentIds.length+backupCount);
  const lengkap=hadirCount>=efektif;
  const absentNames=AS.absentIds.map(i=>roster[i]);
  const liburAktif=liburNames.filter(n=>!AS.backupNames.includes(n));

  const absentDetail=AS.absentIds.length>0?`
    <div class="sbox">
      <div class="srow"><span class="sk">Tidak hadir</span><span class="sv r">${absentNames.join(', ')}</span></div>
      <div class="srow"><span class="sk">Backup</span>
        <span class="sv ${AS.hasBackup?'g':'r'}">${AS.hasBackup?(AS.backupNames.join(', ')||'Ada'):'Tidak ada'}</span></div>
    </div>`:'';

  const liburDetail=AS.hasLibur===true&&liburNames.length?`
    <div class="sbox">
      <div class="srow">
        <span class="sk">Libur</span>
        <span class="sv y">🎌 ${liburNames.join(', ')}</span>
      </div>
      ${AS.backupNames.length?`<div class="srow">
        <span class="sk" style="font-size:12px;">└ masuk backup</span>
        <span style="color:var(--accent);font-size:12px;">${AS.backupNames.join(', ')}</span>
      </div>`:''}
      ${liburAktif.length?`<div class="srow">
        <span class="sk" style="font-size:12px;">└ tetap libur</span>
        <span style="color:var(--accent3);font-size:12px;">${liburAktif.join(', ')}</span>
      </div>`:''}
      ${AS.liburNote?`<div class="srow"><span class="sk">Keterangan</span><span class="sv" style="color:var(--accent3);">${AS.liburNote}</span></div>`:''}
    </div>`:'';

  pg.innerHTML=`<div class="card" style="text-align:center">
    <div style="font-size:38px;margin-bottom:10px">${lengkap?'🎉':'📋'}</div>
    <div class="qn" style="margin-bottom:4px">Absensi Tersimpan!</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:18px">${fmtDate(activeDate)}</p>
    <div class="sbox">
      <div class="srow"><span class="sk">Status</span><span class="sv ${lengkap?'g':'r'}">${lengkap?'✅ Lengkap':'❌ Tidak lengkap'}</span></div>
      <div class="srow"><span class="sk">Masuk</span><span class="sv g">${hadirCount}/${efektif} orang</span></div>
      ${AS.hasLibur===true?`<div class="srow"><span class="sk">Libur</span><span class="sv y">🎌 ${liburAktif.length} orang${liburAktif.length!==liburNames.length?` (${liburNames.length} terdaftar, ${backupCount} masuk backup)`:''}</span></div>`:''}
    </div>
    ${absentDetail}
    ${liburDetail}
    <button class="btn pr btn-blk" onclick="resetAbsen()">+ Absensi Baru</button>
  </div>`;
}

/* ── EDIT MODE state ── */
const ES = { active:false, section:null, absentIds:[], hasBackup:null, backupNames:[], searchQ:'', backupSearchQ:'', liburIds:[], liburNote:'', liburSearchQ:'' };

/* Recalculate entry fields dari data tersimpan */
function recalcEntry(entry){
  const roster=LS.getRoster();
  const liburCount=(entry.liburNames||[]).length;
  const backupCount=entry.hasBackup===true?(entry.backupNames||[]).length:0;
  const absenCount=(entry.absentNames||[]).length;
  const totalTim=entry.totalTim||roster.length; // fallback ke roster saat ini
  const efektif=totalTim-liburCount;
  const hadirCount=Math.min(efektif, efektif-absenCount+backupCount);
  const lengkap=hadirCount>=efektif;
  const liburAktif=(entry.liburNames||[]).filter(n=>!(entry.backupNames||[]).includes(n));
  return {...entry, total:efektif, totalTim, hadirCount, lengkap, liburAktif};
}

/* Already saved — tampilkan data lama, tombol edit per section */
function renderAlreadySaved(pg, entry){
  const roster=LS.getRoster();
  entry=recalcEntry(entry); // selalu hitung ulang dari data tersimpan

  if(ES.active){
    renderEditSection(pg, entry, roster);
    return;
  }

  const absentChips=(entry.absentNames||[]).map(n=>`<span class="tag red" style="font-size:13px;">${n}</span>`).join('');
  const backupChips=(entry.backupNames||[]).map(n=>`<span class="tag" style="font-size:13px;">${n}</span>`).join('');
  const liburChips=(entry.liburNames||[]).map(n=>`<span class="tag yellow" style="font-size:13px;">🎌 ${n}</span>`).join('');
  const liburAktif=entry.liburAktif||[];

  const absentSection=entry.absentNames?.length?`
    <div class="sbox">
      <div class="srow" style="align-items:flex-start;">
        <span class="sk" style="padding-top:2px;">Tidak hadir</span>
        <div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end;">${absentChips}</div>
      </div>
      <div class="srow" style="align-items:flex-start;">
        <span class="sk" style="padding-top:2px;">Backup</span>
        <div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end;">
          ${entry.hasBackup?(backupChips||`<span class="sv g">Ada</span>`):`<span class="sv r">Tidak ada</span>`}
        </div>
      </div>
    </div>`:'';

  const liburSection=entry.hasLibur?`
    <div class="sbox">
      <div class="srow" style="align-items:flex-start;">
        <span class="sk" style="padding-top:2px;">Libur</span>
        <div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end;">${liburChips}</div>
      </div>
      ${entry.backupNames?.length?`<div class="srow"><span class="sk" style="font-size:12px;">└ masuk backup</span><span style="color:var(--accent);font-size:12px;">${entry.backupNames.join(', ')}</span></div>`:''}
      ${liburAktif.length?`<div class="srow"><span class="sk" style="font-size:12px;">└ tetap libur</span><span style="color:var(--accent3);font-size:12px;">${liburAktif.join(', ')}</span></div>`:''}
      ${entry.liburNote?`<div class="srow"><span class="sk">Keterangan</span><span class="sv" style="color:var(--accent3);">${entry.liburNote}</span></div>`:''}
    </div>`:'';

  pg.innerHTML=`<div class="card">
    <div class="slbl">Sudah Tercatat</div>
    <div class="qn" style="margin-bottom:4px;">Data Absensi</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px;">${entry.date}</p>
    <div class="sbox">
      <div class="srow"><span class="sk">Status</span>
        <span class="sv ${entry.lengkap?'g':'r'}">${entry.lengkap?'✅ Lengkap':'❌ Tidak lengkap'}</span></div>
      <div class="srow"><span class="sk">Masuk</span>
        <span class="sv g">${entry.hadirCount} / ${entry.total} orang</span></div>
      ${entry.hasLibur?`<div class="srow"><span class="sk">Libur</span>
        <span class="sv y">🎌 ${(entry.liburNames||[]).length} orang${entry.backupNames?.length?` (${entry.backupNames.length} masuk backup)`:''}</span></div>`:''}
    </div>
    ${absentSection}
    ${liburSection}
    <div class="divider" style="margin:14px 0 12px;"></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Pilih bagian yang ingin diedit:</div>
    <div class="btn-g" style="flex-wrap:wrap;">
      <button class="btn" style="flex:1;" onclick="startEdit('absent')">✏️ Edit Absen</button>
      ${!entry.lengkap?`<button class="btn" style="flex:1;" onclick="startEdit('backup')">✏️ Edit Backup</button>`:''}
      <button class="btn" style="flex:1;border-color:var(--accent3);color:var(--accent3);" onclick="startEdit('libur')">🎌 Edit Libur</button>
    </div>
    <button class="btn" style="width:100%;margin-top:8px;color:var(--accent2);border-color:var(--accent2);" onclick="confirmDeleteEntry()">🗑 Hapus Absensi</button>
  </div>`;
}

function startEdit(section){
  const key=toYMD(activeDate);
  const hist=LS.getHistory();
  const entry=hist.find(h=>h.key===key);
  if(!entry) return;
  const roster=LS.getRoster();

  ES.active=true;
  ES.section=section;
  ES.searchQ='';
  ES.backupSearchQ='';
  ES.liburIds=(entry.liburNames||[]).map(n=>roster.indexOf(n)).filter(i=>i!==-1);
  ES.liburNote=entry.liburNote||'';
  ES.liburSearchQ='';

  if(section==='absent'||section==='backup'){
    ES.absentIds=(entry.absentNames||[]).map(n=>roster.indexOf(n)).filter(i=>i!==-1);
    ES.hasBackup=entry.hasBackup;
    ES.backupNames=[...(entry.backupNames||[])];
  }
  renderAbsensi();
}

function renderEditSection(pg, entry, roster){
  if(ES.section==='absent') renderEditAbsent(pg, roster);
  else if(ES.section==='backup') renderEditBackup(pg, roster);
  else renderEditLibur(pg, roster, entry);
}

function renderEditLibur(pg, roster, entry){
  const absentIds=(entry.absentNames||[]).map(n=>roster.indexOf(n)).filter(i=>i!==-1);
  const q=(ES.liburSearchQ||'').toLowerCase();
  const candidates=roster.filter((_,i)=>!absentIds.includes(i));
  const filtered=candidates.filter(n=>n.toLowerCase().includes(q));

  const items=filtered.map(n=>{
    const i=roster.indexOf(n);
    const sel=ES.liburIds.includes(i);
    const init=n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<button class="name-toggle ${sel?'selected':''}"
      style="${sel?'border-color:var(--accent3);background:rgba(255,209,102,.07);':''}"
      onclick="editToggleLibur(${i})">
      <div class="avatar" style="${sel?'background:rgba(255,209,102,.2);color:var(--accent3);':''}">${init}</div>
      <span class="nm">${n}</span>
      <span class="ck" style="color:var(--accent3);${sel?'opacity:1;':'opacity:0;'}">🎌</span>
    </button>`;
  }).join('');

  const cnt=ES.liburIds.length;
  pg.innerHTML=`<div class="card">
    <div class="slbl">Edit Libur</div>
    <div class="qn">Siapa yang <strong>libur</strong> hari ini?</div>
    <p style="font-size:12px;color:var(--muted);margin:-12px 0 12px;">Data lama sudah di-pre-fill.</p>
    <input type="text" id="editLiburSearch" placeholder="🔍 Cari nama..." value="${ES.liburSearchQ||''}"
      oninput="ES.liburSearchQ=this.value;renderAbsensi()" style="width:100%;margin-bottom:10px;"/>
    <div class="name-scroll">${filtered.length?items:'<div style="color:var(--muted);font-size:13px;padding:8px">Tidak ditemukan.</div>'}</div>
    <div style="margin:10px 0 8px;" class="tags">
      ${cnt>0?`<div class="tag yellow">🎌 Dipilih: ${cnt} orang</div>`:'<div style="color:var(--muted);font-size:13px;">Tidak ada yang libur</div>'}
    </div>
    <input type="text" id="editLiburNote" placeholder="Keterangan libur... (opsional)"
      value="${ES.liburNote}" oninput="ES.liburNote=this.value" style="width:100%;margin-bottom:14px;"/>
    <div class="divider" style="margin:0 0 14px;"></div>
    <div class="btn-g">
      <button class="btn" onclick="cancelEdit()">✕ Batal</button>
      <button class="btn pr" onclick="saveEditLibur()">Simpan ✓</button>
    </div>
  </div>`;
  setTimeout(()=>{ const e=document.getElementById('editLiburSearch'); if(e)e.focus(); },50);
}

function editToggleLibur(i){
  const idx=ES.liburIds.indexOf(i);
  idx===-1?ES.liburIds.push(i):ES.liburIds.splice(idx,1);
  renderAbsensi();
}

function saveEditLibur(){
  const key=toYMD(activeDate);
  const hist=LS.getHistory();
  const idx=hist.findIndex(h=>h.key===key);
  if(idx===-1){ cancelEdit(); return; }
  const roster=LS.getRoster();
  const newLiburNames=ES.liburIds.map(i=>roster[i]);
  const absentCount=(hist[idx].absentNames||[]).length;
  hist[idx]={
    ...hist[idx],
    hasLibur: newLiburNames.length>0,
    liburNames: newLiburNames,
    liburNote: ES.liburNote||'',
    hadirCount: hist[idx].total - absentCount - newLiburNames.length
  };
  LS.saveHistory(hist);
  cancelEdit();
}

function renderEditAbsent(pg, roster){
  const q=ES.searchQ.toLowerCase();
  const filtered=roster.map((n,i)=>({n,i})).filter(({n})=>n.toLowerCase().includes(q));

    const sel=ES.absentIds.includes(i);
    const init=n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<button class="name-toggle ${sel?'selected':''}" onclick="editToggleAbsent(${i})">
      <div class="avatar">${init}</div><span class="nm">${n}</span><span class="ck">✕</span>
    </button>`;
  }).join('');
  const cnt=ES.absentIds.length;
  const autoStatus=cnt===0?'✅ Otomatis: Lengkap':'❌ Otomatis: Tidak lengkap';
  const autoColor=cnt===0?'var(--accent)':'var(--accent2)';

  pg.innerHTML=`<div class="card">
    <div class="slbl">Edit Absensi</div>
    <div class="qn">Siapa yang <strong>tidak hadir</strong>?</div>
    <p style="font-size:12px;color:var(--muted);margin:-12px 0 12px;">Data lama sudah di-pre-fill. Ubah sesuai kebutuhan.</p>
    <input type="text" id="editPickSearch" placeholder="🔍 Cari nama..." value="${ES.searchQ}"
      oninput="ES.searchQ=this.value;renderAbsensi()" style="width:100%;margin-bottom:10px;"/>

      ${cnt>0?`<div class="tag red">❌ Dipilih: ${cnt} orang</div>`:'<div style="color:var(--muted);font-size:13px">Semua hadir</div>'}
    </div>
    <div style="font-size:12px;padding:6px 10px;border-radius:8px;background:var(--bg);border:1px solid var(--border);margin-bottom:14px;">

function editToggleAbsent(i){
  const idx=ES.absentIds.indexOf(i);
  idx===-1?ES.absentIds.push(i):ES.absentIds.splice(idx,1);
  renderAbsensi();
}

function saveEditAbsent(){
  const key=toYMD(activeDate);
  const hist=LS.getHistory();
  const idx=hist.findIndex(h=>h.key===key);
  if(idx===-1){ cancelEdit(); return; }
  const roster=LS.getRoster();
  const newAbsentNames=ES.absentIds.map(i=>roster[i]);
  const newLengkap=newAbsentNames.length===0;

  // if going from absent → lengkap, clear backup
  if(newLengkap){
    hist[idx]={...hist[idx], lengkap:true, absentNames:[], hasBackup:null, backupNames:[], hadirCount:hist[idx].total};
  } else {
    hist[idx]={...hist[idx], lengkap:false, absentNames:newAbsentNames,
      hadirCount:hist[idx].total-newAbsentNames.length};
    // if backup refs removed absentee, keep backup data as-is (still valid)
  }
  LS.saveHistory(hist);
  cancelEdit();
}

function renderEditBackup(pg, roster){
  const q=ES.backupSearchQ.toLowerCase();
  const candidates=roster.filter((_,i)=>!ES.absentIds.includes(i));
  const filtered=candidates.filter(n=>n.toLowerCase().includes(q));
  const items=filtered.map(n=>{
    const sel=ES.backupNames.includes(n);
    const init=n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<button class="name-toggle ${sel?'selected':''}" onclick="editToggleBackup('${n}')">
      <div class="avatar">${init}</div><span class="nm">${n}</span>
      <span class="ck" style="color:var(--accent);">✓</span>
    </button>`;
  }).join('');
  const selectedTags=ES.backupNames.map(n=>
    `<div class="tag">${n} <span style="cursor:pointer;opacity:.6;margin-left:4px" onclick="editToggleBackup('${n}')">×</span></div>`
  ).join('');
  const backupList=ES.hasBackup===true?`
    <input type="text" id="editBackupSearch" placeholder="🔍 Cari dari daftar tim..." value="${ES.backupSearchQ}"
      oninput="ES.backupSearchQ=this.value;renderAbsensi()" style="width:100%;margin-bottom:10px;margin-top:14px;"/>
    <div class="name-scroll" style="max-height:180px;">${filtered.length?items:'<div style="color:var(--muted);font-size:13px;padding:8px">Tidak ditemukan.</div>'}</div>
    ${ES.backupNames.length?`<div class="tags" style="margin-top:10px;">${selectedTags}</div>`:''}`:'';

  pg.innerHTML=`<div class="card">
    <div class="slbl">Edit Backup</div>
    <div class="qn">Edit <strong>backup/pengganti</strong></div>
    <p style="font-size:12px;color:var(--muted);margin:-12px 0 12px;">Data lama sudah di-pre-fill. Ubah sesuai kebutuhan.</p>
    <div class="btn-g" style="margin-bottom:4px;">
      <button class="btn ${ES.hasBackup===true?'pr':''}" onclick="ES.hasBackup=true;renderAbsensi()">✅ Ada backup</button>
      <button class="btn ${ES.hasBackup===false?'dn':''}" onclick="ES.hasBackup=false;ES.backupNames=[];renderAbsensi()">❌ Tidak ada</button>
    </div>
    ${backupList}
    <div class="divider"></div>
    <div class="btn-g">
      <button class="btn" onclick="cancelEdit()">✕ Batal</button>
      <button class="btn pr" onclick="saveEditBackup()" ${ES.hasBackup===null?'disabled':''}>Simpan ✓</button>
    </div>
  </div>`;
  if(ES.hasBackup===true) setTimeout(()=>{const e=document.getElementById('editBackupSearch');if(e)e.focus();},50);
}

function editToggleBackup(n){
  const idx=ES.backupNames.indexOf(n);
  idx===-1?ES.backupNames.push(n):ES.backupNames.splice(idx,1);
  renderAbsensi();
}

function saveEditBackup(){
  const key=toYMD(activeDate);
  const hist=LS.getHistory();
  const idx=hist.findIndex(h=>h.key===key);
  if(idx!==-1){
    hist[idx]={...hist[idx], hasBackup:ES.hasBackup, backupNames:[...ES.backupNames]};
    LS.saveHistory(hist);
  }
  cancelEdit();
}

function confirmDeleteEntry(){
  const key=toYMD(activeDate);
  const hist=LS.getHistory();
  const entry=hist.find(h=>h.key===key);
  if(!entry) return;
  showModal(

function doDeleteEntry(){
  const key=toYMD(activeDate);

  const idx=hist.findIndex(h=>h.key===key);
  if(idx!==-1){ hist.splice(idx,1); LS.saveHistory(hist); }

function deleteEntryByKey(key){

}
function doDeleteByKey(key){

}

function cancelEdit(){
  ES.active=false; ES.section=null; ES.absentIds=[]; ES.hasBackup=null;
  ES.backupNames=[]; ES.searchQ=''; ES.backupSearchQ='';
  ES.liburIds=[]; ES.liburNote=''; ES.liburSearchQ='';
  renderAbsensi();
}

function startEditLibur(){
  const key=toYMD(activeDate);
  const hist=LS.getHistory();
  const entry=hist.find(h=>h.key===key);
  if(!entry) return;
  // reuse AS for libur edit

/* ════════════════════════════════════════
   LAPORAN TAB
════════════════════════════════════════ */
let repMode='harian';
let repHarianDate=''; // will be set fresh on each laporan render
let repWeekStart='', repWeekEnd='';
let repBulanOffset=0;

function renderLaporan(){
  const pg=document.getElementById('page1');
  const hist=LS.getHistory();

  if(!hist.length){
    pg.innerHTML=`<div class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:36px;margin-bottom:12px">📊</div>
      <div class="qn">Belum ada data absensi</div>
      <p style="color:var(--muted);font-size:14px">Isi absensi harian terlebih dahulu.</p>
    </div>`; return;
  }

  if(repMode==='harian') renderLaporanHarian(pg,hist);
  else if(repMode==='mingguan') renderLaporanMingguan(pg,hist);
  else renderLaporanBulanan(pg,hist);
}

/* ── HARIAN ── */
function renderLaporanHarian(pg,hist){
  // make sure repHarianDate is always a clean YYYY-MM-DD string
  const today=toYMD(new Date());
  if(!repHarianDate) repHarianDate=today;

  const entry=hist.find(h=>h.key===repHarianDate);
  const selDate=fromYMD(repHarianDate);
  const histKeys=new Set(hist.map(h=>h.key));

  const detailHTML=entry
    ? buildEntryDetail(entry)
    : `<div class="empty" style="margin-top:4px;">Tidak ada data untuk tanggal ini.</div>`;

  const statsHTML=entry ? buildStats([entry]) : '';

  pg.innerHTML=`<div class="card">
    <div class="slbl">Laporan Kehadiran</div>
    <div class="rep-filter">
      <button class="rep-btn active" onclick="setRepMode('harian')">Harian</button>
      <button class="rep-btn" onclick="setRepMode('mingguan')">Mingguan</button>
      <button class="rep-btn" onclick="setRepMode('bulanan')">Bulanan</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <button class="btn" style="padding:6px 12px;flex-shrink:0;" onclick="shiftHarianDate(-1)">‹</button>
      <div style="flex:1;text-align:center;">
        <div class="date-display" style="display:inline-flex;cursor:pointer;" onclick="toggleHarianDatePicker()">
          <span id="harianDateText">${fmtDate(selDate)}</span>
          <span style="opacity:.5;font-size:11px;margin-left:6px;">✏️</span>
        </div>
        <input type="date" id="harianDateInput" value="${repHarianDate}"
          onchange="applyHarianDate()" onblur="closeHarianDatePicker()"
          style="display:none;margin-top:6px;background:var(--panel);border:1px solid var(--accent);color:var(--text);font-family:'Space Mono',monospace;font-size:12px;padding:6px 12px;border-radius:99px;outline:none;"/>
        <div style="margin-top:4px;">
          ${histKeys.has(repHarianDate)
            ? `<span class="tag" style="font-size:11px;">✅ Ada data</span>`
            : `<span style="font-size:11px;color:var(--muted);">Belum ada data</span>`}
        </div>
      </div>
      <button class="btn" style="padding:6px 12px;flex-shrink:0;" onclick="shiftHarianDate(1)"
        ${repHarianDate>=today?'disabled style="opacity:.3;cursor:not-allowed"':''}>›</button>
    </div>
    ${statsHTML}
    ${detailHTML}
  </div>`;
}

function shiftHarianDate(delta){
  const d=fromYMD(repHarianDate);
  d.setDate(d.getDate()+delta);
  const today=toYMD(new Date());
  const newKey=toYMD(d);
  if(newKey>today) return;
  repHarianDate=newKey;
  renderLaporan();
}
function toggleHarianDatePicker(){
  const el=document.getElementById('harianDateInput');
  const open=el.style.display==='inline-block';
  el.style.display=open?'none':'inline-block';
  if(!open) el.focus();
}
function applyHarianDate(){
  const val=document.getElementById('harianDateInput').value;
  if(val){ repHarianDate=val; document.getElementById('harianDateInput').style.display='none'; renderLaporan(); }
}
function closeHarianDatePicker(){ setTimeout(()=>{ const el=document.getElementById('harianDateInput'); if(el)el.style.display='none'; },200); }

/* ── MINGGUAN ── */
function renderLaporanMingguan(pg,hist){
  // init defaults: Mon-Fri current week
  if(!repWeekStart||!repWeekEnd){
    const now=new Date(); now.setHours(0,0,0,0);
    const dow=(now.getDay()+6)%7;
    const mon=new Date(now); mon.setDate(now.getDate()-dow);
    const fri=new Date(mon); fri.setDate(mon.getDate()+4);
    repWeekStart=toYMD(mon); repWeekEnd=toYMD(fri);
  }

  // validate max 7 days
  const startD=fromYMD(repWeekStart), endD=fromYMD(repWeekEnd);
  const diffDays=Math.round((endD-startD)/(1000*60*60*24));
  const rangeValid=diffDays>=0 && diffDays<=6;
  const rangeColor=!rangeValid?'var(--accent2)':diffDays===6?'var(--accent3)':'var(--accent)';
  const rangeMsg=!rangeValid
    ?'<span style="color:var(--accent2)">⚠️ Maksimal 7 hari</span>'
    :`<span style="color:${rangeColor}">${diffDays+1} hari dipilih</span>`;

  const entries=rangeValid?hist.filter(h=>h.key>=repWeekStart&&h.key<=repWeekEnd):[];
  const statsHTML=buildStats(entries);
  const barHTML=buildBarChart(entries);
  const listHTML=buildEntryList(entries);

  pg.innerHTML=`<div class="card">
    <div class="slbl">Laporan Kehadiran</div>
    <div class="rep-filter">
      <button class="rep-btn" onclick="setRepMode('harian')">Harian</button>
      <button class="rep-btn active" onclick="setRepMode('mingguan')">Mingguan</button>
      <button class="rep-btn" onclick="setRepMode('bulanan')">Bulanan</button>
    </div>
    <div class="week-range-wrap">
      <div class="week-inputs">
        <label>Dari</label>
        <input type="date" id="wStart" value="${repWeekStart}" onchange="setWeekRange()"/>
        <label>s/d</label>
        <input type="date" id="wEnd" value="${repWeekEnd}" onchange="setWeekRange()"/>
      </div>
      <div class="range-hint">${rangeMsg}</div>
    </div>
    ${rangeValid?statsHTML:''}
    ${rangeValid?barHTML:''}
    ${rangeValid?listHTML:''}
  </div>`;
}
function setWeekRange(){
  const s=document.getElementById('wStart')?.value;
  const e=document.getElementById('wEnd')?.value;
  if(s) repWeekStart=s;
  if(e) repWeekEnd=e;
  renderLaporan();
}

/* ── BULANAN ── */
function renderLaporanBulanan(pg,hist){
  const now=new Date();
  const ref=new Date(now.getFullYear(), now.getMonth()+repBulanOffset, 1);
  const y=ref.getFullYear(), m=ref.getMonth();
  const startKey=`${y}-${String(m+1).padStart(2,'0')}-01`;
  const endKey=`${y}-${String(m+1).padStart(2,'0')}-31`;
  const entries=hist.filter(h=>h.key>=startKey&&h.key<=endKey);
  const label=fmtMonth(ref);
  const statsHTML=buildStats(entries);
  const barHTML=buildBarChart(entries, true);
  const listHTML=buildEntryList(entries, true);

  pg.innerHTML=`<div class="card">
    <div class="slbl">Laporan Kehadiran</div>
    <div class="rep-filter">
      <button class="rep-btn" onclick="setRepMode('harian')">Harian</button>
      <button class="rep-btn" onclick="setRepMode('mingguan')">Mingguan</button>
      <button class="rep-btn active" onclick="setRepMode('bulanan')">Bulanan</button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <button class="btn" style="padding:6px 12px;" onclick="repBulanOffset--;renderLaporan()">‹</button>
      <div style="flex:1;text-align:center;font-family:'Space Mono',monospace;font-size:12px;">${label}</div>
      <button class="btn" style="padding:6px 12px;" onclick="repBulanOffset++;renderLaporan()" ${repBulanOffset>=0?'disabled style="opacity:.3;cursor:not-allowed"':''}>›</button>
    </div>
    ${statsHTML}
    ${barHTML}
    ${listHTML}
  </div>`;
}

function setRepMode(m){
  repMode=m;
  if(m==='bulanan') repBulanOffset=0;
  renderLaporan();
}

/* ── SHARED HELPERS ── */
function buildStats(entries){
  const total=entries.length;
  const lengkap=entries.filter(e=>e.lengkap).length;
  const tidak=total-lengkap;
  const totalLibur=entries.reduce((s,e)=>s+(e.liburNames?.length||0),0);
  return `<div class="stat-grid">
    <div class="stat-box"><div class="stat-val y">${total}</div><div class="stat-lbl">Hari Tercatat</div></div>
    <div class="stat-box"><div class="stat-val g">${lengkap}</div><div class="stat-lbl">Hari Lengkap</div></div>
    <div class="stat-box"><div class="stat-val r">${tidak}</div><div class="stat-lbl">Tidak Lengkap</div></div>
  </div>
  ${totalLibur>0?`<div style="text-align:center;font-size:12px;color:var(--accent3);margin-bottom:12px;">🎌 ${totalLibur} orang-hari libur di periode ini</div>`:''}`;
}

function buildBarChart(entries, useNumbers=false){
  if(!entries.length) return '';
  const freq={};
  entries.forEach(e=>e.absentNames?.forEach(n=>{ freq[n]=(freq[n]||0)+1; }));
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length) return `<div style="font-size:13px;color:var(--muted);margin-bottom:14px;text-align:center">Tidak ada ketidakhadiran di periode ini 🎉</div>`;
  const max=sorted[0][1];
  const roster=LS.getRoster();

  // build legend if useNumbers
  const legendHTML=useNumbers?`
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;">
      ${sorted.map(([name])=>{
        const idx=roster.indexOf(name);
        const num=idx!==-1?idx+1:'?';
        return `<span style="font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:2px 8px;border-radius:99px;">
          <span style="color:var(--accent3);font-family:'Space Mono',monospace;">#${num}</span> ${name}
        </span>`;
      }).join('')}
    </div>`:'';

  return `<div class="slbl" style="margin-bottom:8px">Frekuensi Absen per Orang</div>
    ${legendHTML}
    <div class="bar-chart">
      ${sorted.map(([name,cnt])=>{
        const idx=roster.indexOf(name);
        const label=useNumbers?(idx!==-1?`#${idx+1}`:'?'):name;
        return `<div class="bar-row">
          <div class="bar-name" title="${name}">${label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(cnt/max*100).toFixed(0)}%"></div></div>
          <div class="bar-cnt">${cnt}x</div>
        </div>`;
      }).join('')}
    </div>`;
}

function buildEntryList(entries, useNumbers=false){
  if(!entries.length) return `<div class="empty" style="margin-top:4px">Tidak ada data di periode ini.</div>`;
  return `<div class="slbl" style="margin:14px 0 8px">Detail per Hari</div>
    <div class="rep-entries">
      ${entries.map(e=>buildEntryDetail(recalcEntry(e), useNumbers)).join('')}
    </div>`;
}

function nameToNum(name){
  const roster=LS.getRoster();
  const idx=roster.indexOf(name);
  return idx!==-1 ? `#${idx+1}` : name;
}

function buildEntryDetail(e, useNumbers=false){
  e=recalcEntry(e); // hitung ulang supaya angka selalu benar
  const fmt = n => useNumbers ? nameToNum(n) : n;
  const liburAktif = e.liburAktif?.length ? e.liburAktif : (e.liburNames||[]).filter(n=>!(e.backupNames||[]).includes(n));
  const absentRow=e.absentNames?.length?`
    <div class="re-row">
      <span style="color:var(--muted);font-size:12px;flex-shrink:0;">Absen:</span>
      <span style="color:var(--accent2);font-size:12px;">${e.absentNames.map(fmt).join(', ')}</span>
    </div>
    <div class="re-row">
      <span style="color:var(--muted);font-size:12px;flex-shrink:0;">Backup:</span>
      <span style="color:${e.hasBackup?'var(--accent)':'var(--accent2)'};font-size:12px;">
        ${e.hasBackup?(e.backupNames?.map(fmt).join(', ')||'Ada'):'Tidak ada'}
      </span>
    </div>`:'';
  const liburRow=e.hasLibur&&e.liburNames?.length?`
    <div class="re-row">
      <span style="color:var(--muted);font-size:12px;flex-shrink:0;">Libur:</span>
      <span style="color:var(--accent3);font-size:12px;">${e.liburNames.map(n=>n).join(', ')}${e.liburNote?` <span style="color:var(--muted);font-size:11px;">(${e.liburNote})</span>`:''}</span>
    </div>
    ${e.backupNames?.length?`<div class="re-row">
      <span style="color:var(--muted);font-size:12px;flex-shrink:0;">└ backup:</span>
      <span style="color:var(--accent);font-size:12px;">${e.backupNames.join(', ')}</span>
    </div>`:''}
    ${liburAktif.length?`<div class="re-row">
      <span style="color:var(--muted);font-size:12px;flex-shrink:0;">└ tetap libur:</span>
      <span style="color:var(--accent3);font-size:12px;">${liburAktif.join(', ')}</span>
    </div>`:''}
    `:'';
  return `<div class="rep-entry">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
      <div class="re-date" style="margin-bottom:0;">${e.date}</div>
      <button onclick="deleteEntryByKey('${e.key}')" title="Hapus"
        style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 4px;border-radius:4px;transition:all .1s;line-height:1;"
        onmouseover="this.style.color='var(--accent2)'" onmouseout="this.style.color='var(--muted)'">🗑</button>
    </div>
    <div class="re-row">
      <span class="sdot ${e.lengkap?'g':'r'}"></span>
      <span>${e.lengkap?'Lengkap':'Tidak lengkap'}</span>
      <span style="color:var(--muted)">·</span>
      <span style="color:var(--accent)">${e.hadirCount}/${e.total} masuk</span>
    </div>
    ${absentRow}
    ${liburRow}
  </div>`;
}

/* ════════════════════════════════════════
   DATA TAB — Backup / Restore / Export PDF
════════════════════════════════════════ */
function getBackupStatus(){
  const raw=localStorage.getItem('lastBackup');
  if(!raw) return { daysSince:null, label:'Belum pernah backup', color:'var(--accent2)', urgent:true };
  const last=new Date(raw);
  const days=Math.floor((new Date()-last)/(1000*60*60*24));
  if(days===0) return { daysSince:0, label:'Backup hari ini ✅', color:'var(--accent)', urgent:false };
  if(days<=3) return { daysSince:days, label:`${days} hari lalu`, color:'var(--accent)', urgent:false };
  if(days<=7) return { daysSince:days, label:`${days} hari lalu — segera backup!`, color:'var(--accent3)', urgent:false };
  return { daysSince:days, label:`${days} hari lalu — data berisiko hilang!`, color:'var(--accent2)', urgent:true };
}

function setPdfPreset(p){
  const now=new Date(); now.setHours(0,0,0,0);
  const today=toYMD(now);
  let s=today, e=today;
  if(p==='minggu'){
    const dow=(now.getDay()+6)%7;
    const mon=new Date(now); mon.setDate(now.getDate()-dow);
    s=toYMD(mon); e=today;
  } else if(p==='bulan'){
    s=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`; e=today;
  } else if(p==='semua'){
    const hist=LS.getHistory();
    if(hist.length){
      const keys=hist.map(h=>h.key).sort();
      s=keys[0]; e=keys[keys.length-1];
    }
  }
  document.getElementById('pdfStart').value=s;
  document.getElementById('pdfEnd').value=e;
  updatePdfHint();
}

function updatePdfHint(){
  const s=document.getElementById('pdfStart')?.value;
  const e=document.getElementById('pdfEnd')?.value;
  const hint=document.getElementById('pdfRangeHint');
  if(!s||!e||!hint) return;
  const hist=LS.getHistory();
  const cnt=hist.filter(h=>h.key>=s&&h.key<=e).length;
  const diff=Math.round((fromYMD(e)-fromYMD(s))/(1000*60*60*24))+1;
  hint.textContent=`${diff} hari rentang · ${cnt} hari tercatat`;
  hint.style.color=cnt===0?'var(--accent2)':'var(--muted)';
}

function exportJSON(){
  const data={
    exportedAt: new Date().toISOString(),
    roster: LS.getRoster(),
    history: LS.getHistory()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`absensi-backup-${toYMD(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
  // simpan tanggal backup terakhir
  localStorage.setItem('lastBackup', new Date().toISOString());
  renderData(); // refresh tampilan
}

function importJSON(ev){
  const file=ev.target.files?.[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.history||!data.roster) throw new Error('Format tidak valid');
      showModal('📥','Import Data?',
        `File berisi <strong>${data.history.length} hari</strong> absensi dan <strong>${data.roster.length} anggota</strong> tim.<br><br>
        Data yang ada sekarang akan <strong>ditimpa</strong>. Lanjutkan?`,
        `<button class="btn" onclick="closeModal()">Batal</button>
         <button class="btn pr" onclick="closeModal();doImport(${JSON.stringify(JSON.stringify(data))})">Ya, Import</button>`
      );
    }catch(err){
      showModal('❌','Gagal Import',`File tidak valid atau rusak.<br><small>${err.message}</small>`,
        `<button class="btn pr" onclick="closeModal()">OK</button>`);
    }
  };
  reader.readAsText(file);
  ev.target.value='';
}

function doImport(jsonStr){
  try{
    const data=JSON.parse(jsonStr);
    LS.saveRoster(data.roster);
    LS.saveHistory(data.history);
    showModal('✅','Import Berhasil',
      `${data.history.length} hari absensi dan ${data.roster.length} anggota tim berhasil di-restore.`,
      `<button class="btn pr" onclick="closeModal();switchTab(0)">OK</button>`);
  }catch(e){
    showModal('❌','Gagal','Terjadi kesalahan saat import.',`<button class="btn pr" onclick="closeModal()">OK</button>`);
  }
}

function exportPDF(){
  const s=document.getElementById('pdfStart')?.value;
  const e=document.getElementById('pdfEnd')?.value;
  if(!s||!e){ alert('Pilih rentang tanggal dulu.'); return; }

  const hist=LS.getHistory();
  const roster=LS.getRoster();
  const entries=hist.filter(h=>h.key>=s&&h.key<=e).sort((a,b)=>a.key.localeCompare(b.key));

  if(!entries.length){
    showModal('📭','Tidak Ada Data','Tidak ada data absensi di rentang tanggal ini.',
      `<button class="btn pr" onclick="closeModal()">OK</button>`);
    return;
  }

  // build roster legend
  const legendRows=roster.map((n,i)=>
    `<tr><td style="width:40px;color:#888;font-family:monospace;">#${i+1}</td><td>${n}</td></tr>`
  ).join('');

  // build entry rows
  const entryRows=entries.map(raw=>{
    const e=recalcEntry(raw);
    const absenStr=e.absentNames?.length ? e.absentNames.join(', ') : '—';
    const backupStr=e.hasBackup ? (e.backupNames?.join(', ')||'Ada') : (e.absentNames?.length?'Tidak ada':'—');
    const liburAktif=e.liburAktif?.length ? e.liburAktif : (e.liburNames||[]).filter(n=>!(e.backupNames||[]).includes(n));
    const liburStr=e.hasLibur&&e.liburNames?.length
      ? liburAktif.join(', ')+(e.liburNote?` (${e.liburNote})`:'')+(e.backupNames?.length?` [backup: ${e.backupNames.join(', ')}]`:'')
      : '—';
    const statusColor=e.lengkap?'#16a34a':'#dc2626';
    return `<tr>
      <td>${e.date}</td>
      <td style="color:${statusColor};font-weight:600;">${e.lengkap?'Lengkap':'Tidak lengkap'}</td>
      <td style="text-align:center;">${e.hadirCount}/${e.total}</td>
      <td>${absenStr}</td>
      <td>${backupStr}</td>
      <td style="color:#d97706;">${liburStr}</td>
    </tr>`;
  }).join('');

  // stats
  const total=entries.length;
  const lengkap=entries.filter(e=>e.lengkap).length;
  const tidak=total-lengkap;
  const totalAbsen=entries.reduce((s,e)=>s+(e.absentNames?.length||0),0);

  const startFmt=fmtDate(fromYMD(s));
  const endFmt=fmtDate(fromYMD(e));
  const rangeLabel=s===e?startFmt:`${startFmt} s/d ${endFmt}`;

  const htmlContent=`<!DOCTYPE html>
<html><head><meta charset="UTF-8"/>
<title>Laporan Absensi</title>
<style>
  body{font-family:'Segoe UI',Arial,sans-serif;margin:0;padding:24px;color:#1a1a1a;font-size:13px;}
  h1{font-size:20px;margin-bottom:2px;color:#111;}
  .subtitle{color:#666;font-size:12px;margin-bottom:20px;}
  .stats{display:flex;gap:12px;margin-bottom:20px;}
  .stat{background:#f4f4f5;border-radius:8px;padding:10px 16px;text-align:center;flex:1;}
  .stat-val{font-size:22px;font-weight:700;font-family:monospace;}
  .stat-lbl{font-size:11px;color:#666;margin-top:2px;}
  .g{color:#16a34a;} .r{color:#dc2626;} .y{color:#d97706;}
  table{width:100%;border-collapse:collapse;margin-bottom:20px;}
  th{background:#f4f4f5;padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#555;border-bottom:2px solid #e5e5e5;}
  td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  .legend table{font-size:12px;}
  .legend td{padding:4px 8px;}
  h3{font-size:13px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px;}
  @media print{body{padding:0;}button{display:none;}}
</style>
</head><body>
  <h1>Laporan Absensi</h1>
  <div class="subtitle">${rangeLabel} · Dicetak ${new Date().toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>

  <div class="stats">
    <div class="stat"><div class="stat-val y">${total}</div><div class="stat-lbl">Hari Tercatat</div></div>
    <div class="stat"><div class="stat-val g">${lengkap}</div><div class="stat-lbl">Hari Lengkap</div></div>
    <div class="stat"><div class="stat-val r">${tidak}</div><div class="stat-lbl">Tidak Lengkap</div></div>
    <div class="stat"><div class="stat-val r">${totalAbsen}</div><div class="stat-lbl">Total Absen</div></div>
  </div>

  ${roster.length?`<div class="legend" style="margin-bottom:20px;">
    <h3>Daftar Tim</h3>

  </div>`:''}

  <h3>Detail Kehadiran</h3>
  <table>
    <thead><tr>
      <th>Tanggal</th><th>Status</th><th>Masuk</th><th>Absen</th><th>Backup</th><th>Libur</th>
    </tr></thead>
    <tbody>${entryRows}</tbody>
  </table>
</body></html>`;

  // open print window
  const win=window.open('','_blank','width=900,height=700');
  win.document.write(htmlContent);
  win.document.close();
  win.onload=()=>{ win.focus(); win.print(); };

function checkBackupReminder(){
  const bk=getBackupStatus();
  const hist=LS.getHistory();
  if(!hist.length) return;
  if(bk.daysSince!==null && bk.daysSince<=3) return;
  setTimeout(()=>{
    const toast=document.getElementById('backupToast');
    const msg=document.getElementById('backupToastMsg');
    if(!toast||!msg) return;
    msg.textContent=bk.daysSince===null
      ?'Belum pernah backup! Pergi ke tab 💾 Data untuk backup sekarang.'
      :`Backup terakhir ${bk.daysSince} hari lalu — segera backup data kamu!`;
    toast.style.transform='translateY(0)';
    toast.style.opacity='1';
  },1500);
}

function dismissToast(){
  const t=document.getElementById('backupToast');
  if(t){ t.style.transform='translate(-50%,100px)'; t.style.opacity='0'; }
}
